name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20.x
          - os: ubuntu-latest
            node: 22.x
          - os: windows-latest
            node: 20.x
          - os: macos-latest
            node: 20.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build database
        run: npm run build:db

      - name: Build renderer
        run: npm run build

      - name: Build Electron main/preload
        run: npm run build:main

      - name: Run tests
        run: npm test

      - name: Upload build artifacts (Linux Node 20)
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-linux
          path: |
            dist/
            data/squirrels.db
          retention-days: 7

  package-smoke-windows:
    name: Package Smoke (Windows)
    runs-on: windows-latest
    timeout-minutes: 40
    needs: validate
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build database
        run: npm run build:db

      - name: Build and package app (no auto-publish)
        run: npm run package:ci

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-smoke-windows
          path: release/**
          retention-days: 7
