name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag to publish (example v0.2.0). Leave empty to build artifacts only.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 50
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build database
        run: npm run build:db

      - name: Build and package app (no auto-publish)
        run: npm run package:ci

      - name: Derive release metadata
        id: meta
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || '' }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [[ -n "${RELEASE_TAG_INPUT}" ]]; then
            echo "tag_name=${RELEASE_TAG_INPUT}" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ steps.meta.outputs.tag_name }}
          path: |
            release/*Setup*.exe
            release/*Setup*.exe.blockmap
            release/latest*.yml
            release/app-update.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: needs.build-windows.outputs.should_publish == 'true'

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-${{ needs.build-windows.outputs.tag_name }}
          path: release-assets

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/*Setup*.exe
            release-assets/*Setup*.exe.blockmap
            release-assets/latest*.yml
            release-assets/app-update.yml
