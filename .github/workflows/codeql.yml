name: CodeQL

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODEQL_UPLOAD: ${{ vars.CODEQL_UPLOAD || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@v3
        with:
          output: sarif-results
          upload: ${{ env.CODEQL_UPLOAD == 'true' && github.event_name != 'pull_request' }}

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ github.run_id }}
          path: sarif-results/**/*.sarif
          if-no-files-found: warn
          retention-days: 7

      - name: Upload guidance
        if: env.CODEQL_UPLOAD != 'true'
        run: |
          echo "::notice::CodeQL upload to GitHub Code Scanning is disabled."
          echo "::notice::After enabling Code Scanning in repository settings, set repo variable CODEQL_UPLOAD=true."
