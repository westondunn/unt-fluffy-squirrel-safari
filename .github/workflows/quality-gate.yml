name: Quality Gates

on:
  workflow_call:
    inputs:
      gates:
        description: Comma-separated gate names or "all"
        required: false
        default: all
        type: string
      continue_on_failure:
        description: Run all gates even if one fails
        required: false
        default: false
        type: boolean

jobs:
  run-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        shell: bash
        run: |
          ARGS=""
          if [[ "${{ inputs.gates }}" != "all" ]]; then
            IFS=',' read -ra GATE_ARRAY <<< "${{ inputs.gates }}"
            for gate in "${GATE_ARRAY[@]}"; do
              gate=$(echo "$gate" | xargs)
              bash scripts/gates/run-gate.sh --gate "$gate"
            done
          else
            CONTINUE_FLAG=""
            if [[ "${{ inputs.continue_on_failure }}" == "true" ]]; then
              CONTINUE_FLAG="--continue-on-failure"
            fi
            bash scripts/gates/run-gate.sh --all $CONTINUE_FLAG
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore
