name: Package Smoke (Cross-Platform)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'electron-builder.json5'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/package-smoke-cross-platform.yml'

permissions:
  contents: read

concurrency:
  group: package-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: package-smoke-windows
            package_cmd: npx electron-builder --publish never --win nsis
          - os: macos-latest
            label: macOS
            artifact_name: package-smoke-macos
            package_cmd: npx electron-builder --publish never --mac dmg
          - os: ubuntu-latest
            label: Linux
            artifact_name: package-smoke-linux
            package_cmd: npx electron-builder --publish never --linux AppImage

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build database
        run: npm run build:db

      - name: Build app bundles
        run: |
          npm run build
          npm run build:main

      - name: Package app
        shell: bash
        run: ${{ matrix.package_cmd }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/**
          if-no-files-found: error
          retention-days: 7
